<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trade Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, sans-serif;
            background: #0e0e0e;
            color: #e0e0e0;
            padding: 30px 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        input {
            width: 100%;
            background: #1a1a1a;
            border: 1px solid #2e2e2e;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 16px;
            color: #fff;
            outline: none;
            -moz-appearance: textfield;
        }

        input::-webkit-inner-spin-button,
        input::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        input:focus {
            border-color: #555;
        }

        button {
            width: 100%;
            margin-top: 6px;
            padding: 12px;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        hr {
            border: none;
            border-top: 1px solid #222;
            margin: 24px 0;
        }

        .results {
            display: none;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 7px 0;
            border-bottom: 1px solid #1e1e1e;
            font-size: 15px;
        }

        .row:last-child {
            border-bottom: none;
        }

        .row span:first-child {
            color: #888;
        }

        .val {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .green {
            color: #22c55e;
        }

        .red {
            color: #ef4444;
        }

        .blue {
            color: #60a5fa;
        }

        .gold {
            color: #f59e0b;
        }

        .shares-big {
            text-align: center;
            padding: 20px 0 18px;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 6px;
        }

        .shares-big .slabel {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .shares-big .snum {
            font-size: 56px;
            font-weight: 800;
            color: #60a5fa;
            line-height: 1;
            background: transparent;
            border: none;
            text-align: center;
            width: 100%;
            outline: none;
            cursor: text;
        }

        .shares-big .ssub {
            font-size: 13px;
            color: #555;
            margin-top: 6px;
        }

        .err {
            display: none;
            color: #f87171;
            font-size: 13px;
            margin-top: 8px;
        }

        .label-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .label-row label {
            margin-bottom: 0;
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toggle-wrap span {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            user-select: none;
        }

        .toggle {
            position: relative;
            width: 34px;
            height: 18px;
            cursor: pointer;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .toggle .slider {
            position: absolute;
            inset: 0;
            background: #2e2e2e;
            border-radius: 9px;
            transition: background 0.2s;
        }

        .toggle .slider::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #888;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }

        .toggle input:checked + .slider {
            background: #2563eb;
        }

        .toggle input:checked + .slider::after {
            transform: translateX(16px);
            background: #fff;
        }
    </style>
</head>

<body>

    <h1>Trade Calculator</h1>

    <div class="field">
        <label>Account Balance ($)</label>
        <input type="number" id="account" placeholder="200600" oninput="calc()" />
    </div>

    <div class="field">
        <div class="label-row">
            <label>Risk % (default 1%)</label>
            <div class="toggle-wrap">
                <span>Overspend</span>
                <label class="toggle">
                    <input type="checkbox" id="overspend" onchange="calc()" />
                    <div class="slider"></div>
                </label>
            </div>
        </div>
        <input type="number" id="risk" placeholder="1" value="1" oninput="calc()" />
    </div>

    <div class="field">
        <label>Entry Price ($)</label>
        <input type="number" id="entry" placeholder="230.00" step="0.01" oninput="calc()" />
    </div>

    <div class="field">
        <label>Stop-Loss Price ($)</label>
        <input type="number" id="stop" placeholder="225.00" step="0.01" oninput="calc()" />
    </div>

    <div class="field">
        <label>Profit Target ($) — optional</label>
        <input type="number" id="target" placeholder="245.00" step="0.01" oninput="calc()" />
    </div>

    <button onclick="calc()">Calculate</button>
    <div class="err" id="err"></div>

    <div class="results" id="results">
        <hr />

        <div class="shares-big">
            <div class="slabel">Shares to Buy</div>
            <input type="number" class="snum" id="r-shares" oninput="manualUpdate()" />
            <div class="ssub" id="r-shares-sub"></div>
        </div>

        <div class="row"><span>Max $ at Risk</span> <span class="val gold" id="r-risk"></span></div>
        <div class="row"><span>Risk Per Share</span> <span class="val" id="r-rps"></span></div>
        <div class="row"><span>Total Cost</span> <span class="val" id="r-cost"></span></div>
        <div class="shares-big" style="border-color:#2d1a1a">
            <div class="slabel">Max Loss</div>
            <div class="snum" id="r-loss" style="color:#ef4444"></div>
            <div class="ssub" id="r-loss-sub"></div>
        </div>

        <div class="shares-big" id="row-gain" style="border-color:#1a2d1a">
            <div class="slabel">Potential Reward</div>
            <div class="snum" id="r-gain" style="color:#22c55e"></div>
            <div class="ssub" id="r-gain-sub"></div>
        </div>

        <div class="row"><span>Stop-Loss at</span> <span class="val red" id="r-stop"></span></div>
        <div class="row" id="row-rr"><span>Risk : Reward</span> <span class="val gold" id="r-rr"></span></div>
        <div class="row"><span>Account After Loss</span> <span class="val" id="r-after-loss"></span></div>
        <div class="row" id="row-target"><span>Profit Target</span> <span class="val green" id="r-target"></span></div>
        <div class="row" id="row-after"><span>Account After Profit</span> <span class="val green"
                id="r-after-profit"></span></div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const fmt = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        function err(msg) {
            $('err').textContent = msg;
            $('err').style.display = 'block';
            $('results').style.display = 'none';
        }

        function calc() {
            $('err').style.display = 'none';

            const acc = parseFloat($('account').value);
            const riskPct = parseFloat($('risk').value) || 1;
            const entry = parseFloat($('entry').value);
            const stop = parseFloat($('stop').value);
            const target = parseFloat($('target').value);

            // Update Total Risk immediately if account and risk are valid
            if (acc && acc > 0) {
                const totalRisk = acc * (riskPct / 100);
                $('r-risk').textContent = fmt(totalRisk);
            } else {
                $('r-risk').textContent = '--';
            }

            // Check if full trade can be calculated
            if (!acc || acc <= 0 || !entry || entry <= 0 || !stop || stop <= 0) {
                $('results').style.display = 'block'; // Keep results visible for the Risk update
                $('r-shares').value = '';
                $('r-shares-sub').textContent = 'waiting for entry/stop...';
                $('r-cost').textContent = '--';
                $('r-stop').textContent = '--';
                $('r-loss').textContent = '--';
                $('r-loss-sub').textContent = '--';
                $('r-after-loss').textContent = '--';
                $('r-gain').textContent = '';
                $('r-gain-sub').textContent = '';
                ['row-target', 'row-gain', 'row-rr', 'row-after'].forEach(id => $(id).style.display = 'none');
                return;
            }

            if (stop >= entry) {
                return err('Stop-loss must be below entry price.');
            }

            const totalRisk = acc * (riskPct / 100);
            const riskPerShare = entry - stop;
            let shares = Math.floor(totalRisk / riskPerShare);

            // Limit shares to purchasing power unless overspend is on
            if (!$('overspend').checked) {
                const maxShares = Math.floor(acc / entry);
                if (shares > maxShares) {
                    shares = maxShares;
                }
            }

            const cost = shares * entry;
            const maxLoss = shares * riskPerShare;

            $('r-shares').value = shares;
            $('r-shares-sub').textContent = 'shares  ·  total cost ' + fmt(cost);
            $('r-cost').textContent = fmt(cost);
            $('r-stop').textContent = fmt(stop);
            $('r-loss').textContent = '−' + fmt(maxLoss);
            $('r-loss-sub').textContent = 'account after stop: ' + fmt(acc - maxLoss);
            $('r-after-loss').textContent = fmt(acc - maxLoss);

            if (target && target > entry) {
                const gain = shares * (target - entry);
                const rr = (target - entry) / riskPerShare;
                $('r-target').textContent = fmt(target);
                $('r-gain').textContent = '+' + fmt(gain);
                $('r-gain-sub').textContent = 'account after profit: ' + fmt(acc + gain);
                $('r-rr').textContent = '1 : ' + rr.toFixed(2);
                $('r-after-profit').textContent = fmt(acc + gain);
                ['row-target', 'row-gain', 'row-rr', 'row-after'].forEach(id => $(id).style.display = '');
            } else {
                $('r-gain').textContent = '';
                $('r-gain-sub').textContent = 'enter a profit target above';
                ['row-target', 'row-gain', 'row-rr', 'row-after'].forEach(id => $(id).style.display = 'none');
            }

            $('results').style.display = 'block';
        }

        function manualUpdate() {
            const acc = parseFloat($('account').value);
            const entry = parseFloat($('entry').value);
            const stop = parseFloat($('stop').value);
            const target = parseFloat($('target').value);
            const shares = parseFloat($('r-shares').value) || 0;

            if (!acc || !entry || !stop) return;

            const cost = shares * entry;
            const maxLoss = shares * (entry - stop);

            $('r-shares-sub').textContent = 'shares  ·  total cost ' + fmt(cost);
            $('r-cost').textContent = fmt(cost);
            $('r-loss').textContent = '−' + fmt(maxLoss);
            $('r-loss-sub').textContent = 'account after stop: ' + fmt(acc - maxLoss);
            $('r-after-loss').textContent = fmt(acc - maxLoss);

            if (target && target > entry) {
                const gain = shares * (target - entry);
                const rr = (target - entry) / (entry - stop);
                $('r-gain').textContent = '+' + fmt(gain);
                $('r-gain-sub').textContent = 'account after profit: ' + fmt(acc + gain);
                $('r-after-profit').textContent = fmt(acc + gain);
            }
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') calc(); });
    </script>
</body>

</html>
